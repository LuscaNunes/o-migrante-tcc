<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratório Anime.js - O Migrante</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #87CEEB, #98FB98);
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }
    h1 { color: #333; margin-bottom: 10px; }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      max-width: 800px;
      width: 100%;
    }
    button {
      padding: 16px 8px;
      font-size: 14px;
      font-weight: bold;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    button:active { transform: scale(0.95); }
    #demo { width: 120px; height: 120px; background: #FF6B6B; border-radius: 20px; margin: 30px auto; }
  </style>
</head>
<body>

  <h1>Laboratório Anime.js</h1>
  <div id="demo"></div>

  <div class="container">
    <button style="background:#FF6B6B" onclick="efeito1()">1. Pulo Simples</button>
    <button style="background:#4ECDC4" onclick="efeito2()">2. Girar 360°</button>
    <button style="background:#45B7D1" onclick="efeito3()">3. Fade + Scale</button>
    <button style="background:#96CEB4" onclick="efeito4()">4. Elasticidade</button>
    <button style="background:#FECA57" onclick="efeito5()">5. Boing (Bounce)</button>
    <button style="background:#FF9FF3" onclick="efeito6()">6. Tremor</button>
    <button style="background:#54A0FF" onclick="efeito7()">7. Stagger (Sequência)</button>
    <button style="background:#FF6347" onclick="efeito8()">8. Timeline (Combo)</button>
    <button style="background:#6C5CE7" onclick="efeito9()">9. Cor + Forma</button>
    <button style="background:#00D2D3" onclick="efeito10()">10. Cabeça Voa (Easter Egg)</button>
  </div>

  <!-- Anime.js via CDN (nunca falha) -->
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>

  <script>
    const demo = document.getElementById('demo');

    // 1. Pulo simples
    function efeito1() {
      anime({
        targets: demo,
        translateY: [-150, 0],
        duration: 800,
        easing: 'easeOutBounce'
      });
    }

    // 2. Girar 360°
    function efeito2() {
      anime({
        targets: demo,
        rotate: '1turn',
        duration: 1000,
        easing: 'easeInOutSine'
      });
    }

    // 3. Fade + Scale (ótimo pra botões)
    function efeito3() {
      anime({
        targets: demo,
        scale: [0.5, 1.3, 1],
        opacity: [0, 1],
        duration: 1200,
        easing: 'easeOutElastic(1, 0.6)'
      });
    }

    // 4. Elasticidade (cabeça voltando)
    function efeito4() {
      anime({
        targets: demo,
        translateY: -300,
        duration: 1500,
        direction: 'alternate',
        easing: 'easeOutElastic(1, 0.4)'
      });
    }

    // 5. Boing realista
    function efeito5() {
      anime({
        targets: demo,
        translateY: [0, -200, 0, -100, 0],
        duration: 1200,
        easing: 'easeOutBounce'
      });
    }

    // 6. Tremor (quando leva dano)
    function efeito6() {
      anime({
        targets: demo,
        translateX: [-10, 10, -10, 10, 0],
        duration: 300,
        easing: 'easeInOutSine'
      });
    }

    // 7. Stagger – anima vários de uma vez (perfeito pra partículas)
    function efeito7() {
      anime({
        targets: '.container button',
        translateY: [-50, 0],
        delay: anime.stagger(50), // um depois do outro
        duration: 800,
        easing: 'easeOutBounce'
      });
    }

    // 8. Timeline – sequência de animações (COMBO FODA)
    function efeito8() {
      const tl = anime.timeline({
        targets: demo,
        easing: 'easeInOutSine'
      });
      tl.add({ scale: 0.5, opacity: 0, duration: 300 })
        .add({ scale: 2, backgroundColor: '#FFD700', duration: 500 })
        .add({ rotate: '2turn', duration: 800 })
        .add({ scale: 1, backgroundColor: '#FF6B6B', duration: 400 });
    }

    // 9. Mudar cor + forma (morphing básico)
    function efeito9() {
      anime({
        targets: demo,
        backgroundColor: ['#FF6B6B', '#00FF00', '#0000FF', '#FF6B6B'],
        borderRadius: ['20px', '50%', '0%', '20px'],
        duration: 3000,
        easing: 'easeInOutQuad'
      });
    }

    // 10. EASTER EGG – Cabeça voando (igual o boneco anterior)
    function efeito10() {
      anime({
        targets: demo,
        translateY: [0, -350, 0],
        rotate: [0, -0.5, 3, 0],
        scale: [1, 1.3, 1],
        duration: 2000,
        easing: 'easeOutElastic(1, 0.5)',
        complete: () => {
          alert("A CABEÇA VOLTOU!!!");
        }
      });
    }

    // Só pra começar com estilo
    anime({
      targets: 'h1',
      translateY: [-100, 0],
      opacity: [0, 1],
      duration: 1500,
      easing: 'easeOutBounce'
    });
  </script>
</body>
</html>
