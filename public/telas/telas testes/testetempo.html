<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo com Parallax Inverso</title>

<style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
    }

    .container {
        position: fixed;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
    }

    .bg {
        position: absolute;
        width: 110vw;   /* zoom para permitir movimento sem bordas */
        height: 110vh;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(1.05); /* Centraliza e aplica um pequeno zoom inicial */
        object-fit: cover;
        transition: transform 0.05s linear; /* Adiciona uma transição suave para o movimento */
    }
</style>

</head>
<body>

<div class="container">
    <img class="bg" src="Teste fundo migrante (1) (1).jpg" alt="Fundo do Jogo">
</div>

<script>
    const img = document.querySelector(".bg");

    document.addEventListener("mousemove", (e) => {
        // Calcula a posição do mouse normalizada de -0.5 a 0.5
        // e multiplica por 30 para determinar o quanto a imagem deve se mover
        const mouseX = (e.clientX / window.innerWidth - 0.5) * 30; 
        const mouseY = (e.clientY / window.innerHeight - 0.5) * 30;

        // --- MUDANÇA AQUI: Inverte o sinal dos movimentos ---
        const x = -mouseX; // Mouse para direita (mouseX positivo) -> Imagem para esquerda (x negativo)
        const y = -mouseY; // Mouse para baixo (mouseY positivo) -> Imagem para cima (y negativo)
        // --- FIM DA MUDANÇA ---

        img.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(1.05)`;
    });
</script>

</body>
</html>
