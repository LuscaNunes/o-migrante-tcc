<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Ring</title>
</head>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
  }

  .ring {
    position: relative;
    width: 400px;
    height: 400px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .ring i {
    position: absolute;
    inset: 0;
    border: 2px solid #fff;
    transition: 0.5s;
  }

  .ring i:nth-child(1) {
    border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
    animation: animate 6s linear infinite;
  }

  .ring i:nth-child(2) {
    border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
    animation: animate 4s linear infinite;
  }

  @keyframes animate {
    0% {
      transform: rotate(0deg);
      filter: hue-rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
      filter: hue-rotate(360deg);
    }
  }

  .login {
    position: absolute;
    width: 280px;
    text-align: center;
    color: #fff;
  }

  .inputBx input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    outline: none;
    background: transparent;
    border: 2px solid #fff;
    border-radius: 20px;
    color: #fff;
  }

  .inputBx button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: #fff;
    background: linear-gradient(45deg, #ff5f6d, #ffc371);
  }

  .links {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
  }

  .links a {
    color: #bbb;
    font-size: 14px;
    text-decoration: none;
  }
</style>

<body>

  <div class="ring">
    <i></i>
    <i></i>

    <div class="login">
      <h1>Login</h1>

      <div class="inputBx">
        <input type="text" placeholder="Username">
      </div>

      <div class="inputBx">
        <input type="password" placeholder="Password">
      </div>

      <div class="inputBx">
        <button>Sign In</button>
      </div>

      <div class="links">
        <a href="#">Forgot Password</a>
        <a href="#">Signup</a>
      </div>
    </div>
  </div>

</body>

</html>
