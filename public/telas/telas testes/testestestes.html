<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Teste Anime.js no Migrante</title>
  <style>
    #caixa { width: 100px; height: 100px; background: #FF6B6B; margin: 100px; }
  </style>
</head>
<body>
  <div id="caixa"></div>

  <script type="module">
    import { anime } from './node_modules/animejs/lib/anime.es.js';
    
    anime({
      targets: '#caixa',
      translateX: 500,
      rotate: '2turn',
      scale: [1, 1.5, 1],
      duration: 2000,
      direction: 'alternate',
      loop: true,
      easing: 'easeInOutSine'
    });
  </script>
</body>
</html>
