<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Anime.js - O Migrante</title>
  <style>
    #caixa {
      width: 100px;
      height: 100px;
      background: #FF6B6B;
      margin: 200px auto;
    }
  </style>
</head>
<body>
  <div id="caixa"></div>

  <!-- IMPORT CORRETO DA VERSÃO DO NPM (v4) -->
  <script type="module">
    import { anime } from '../node_modules/animejs/lib/anime.es.js';

    // Agora sim a animação roda!
    anime({
      targets: '#caixa',
      translateX: [0, 600, 0],     // vai, volta
      translateY: [0, -200, 0],
      rotate: '3turn',
      scale: [1, 1.6, 1],
      backgroundColor: ['#FF6B6B', '#4ECDC4', '#FF6B6B'],
      duration: 3000,
      direction: 'alternate',
      loop: true,
      easing: 'easeInOutSine'
    });
  </script>
</body>
</html>
