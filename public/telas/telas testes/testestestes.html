<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fire Transition</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: #060b10;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  #center {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    z-index: 10;
  }

  #fire {
    width: 260px;
    height: 260px;
  }

  #flash {
    position: absolute;
    width: 0px;
    height: 0px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,180,0.9), rgba(255,140,0,0.4), rgba(255,0,0,0));
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -50%);
    transition: all 0.8s ease-out;
  }

  .btn {
    padding: 10px 22px;
    background: #102738;
    color: white;
    border: 1px solid #24445a;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    transition: 0.2s;
  }

  .btn:hover { background: #1c3f55; }

  select {
    padding: 8px 12px;
    background: #102738;
    color: white;
    border-radius: 6px;
    border: 1px solid #24445a;
  }
</style>
</head>
<body>

<div id="flash"></div>

<div id="center">
  <div id="fire"></div>

  <!-- Menu com todos os arquivos -->
  <select id="animSelector">
    <option value="./aprendendo na nuvem.json">Aprendendo na Nuvem</option>
    <option value="./Tenda.json">Tenda</option>
    <option value="./sarsaArdente.json">Sarsa Ardente</option>
    <option value="./fire.json">Chama (Fire)</option>
  </select>

  <div>
    <button class="btn" id="playBtn">Play</button>
    <button class="btn" id="resetBtn">Reset</button>
  </div>
</div>

<script src="https://unpkg.com/lottie-web/build/player/lottie.min.js"></script>

<script>
  const fireContainer = document.getElementById("fire");
  const selector = document.getElementById("animSelector");
  let fireAnim = null;

  function loadAnimation(path) {
    if (fireAnim) fireAnim.destroy();

    fireAnim = lottie.loadAnimation({
      container: fireContainer,
      renderer: "svg",
      loop: true,
      autoplay: true,
      path
    });

    fireAnim.addEventListener("data_failed", () => {
      console.error("Erro ao carregar:", path);
    });
  }

  // Carrega a animação inicial
  loadAnimation("./aprendendo na nuvem.json");

  selector.addEventListener("change", (e) => {
    loadAnimation(e.target.value);
  });

  const flash = document.getElementById("flash");

  document.getElementById("playBtn").addEventListener("click", () => {
    fireAnim.play();

    // Somente fire.json terá efeito de brilho
    const file = selector.value;

    if (file.includes("fire.json")) {
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      flash.style.left = centerX + "px";
      flash.style.top = centerY + "px";

      flash.style.opacity = "1";
      flash.style.width = "40px";
      flash.style.height = "40px";

      setTimeout(() => {
        flash.style.width = "2000px";
        flash.style.height = "2000px";
      }, 10);

      setTimeout(() => {
        flash.style.opacity = "0";
      }, 800);
    }
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (fireAnim) {
      fireAnim.stop();
      fireAnim.playSegments([0, 1], true);
    }

    flash.style.opacity = "0";
    flash.style.width = "0px";
    flash.style.height = "0px";
  });
</script>

</body>
</html>
