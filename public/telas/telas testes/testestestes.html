<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O Migrante - Carregando...</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #1e40af, #3b82f6); overflow: hidden; }
    #loader { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
    #progressBar { height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; overflow: hidden; margin-top: 30px; width: 280px; }
    #progressFill { height: 100%; background: #fff; width: 0%; border-radius: 3px; }
  </style>
</head>
<body>

<!-- TELA DE LOADING TIPO DUOLINGO -->
<div id="loader">
  <!-- TEU BONECO MIGRANTE (feito com SVG simples) -->
  <svg width="180" height="220" viewBox="0 0 180 220" id="migrante">
    <!-- Cabeça -->
    <circle cx="90" cy="70" r="45" fill="#FFBFA0"/>
    <!-- Olhos -->
    <circle cx="75" cy="65" r="8" fill="#000"/>
    <circle cx="105" cy="65" r="8" fill="#000"/>
    <!-- Sorriso -->
    <path d="M70 85 Q90 110 110 85" stroke="#000" stroke-width="6" fill="none"/>
    <!-- Corpo -->
    <rect x="60" y="110" width="60" height="80" rx="20" fill="#FF6B6B"/>
    <!-- Mochila -->
    <rect x="50" y="120" width="80" height="60" rx="15" fill="#4444FF"/>
    <!-- Pernas -->
    <rect x="70" y="185" width="20" height="30" fill="#4444FF"/>
    <rect x="90" y="185" width="20" height="30" fill="#4444FF"/>
  </svg>

  <!-- Animação de respiração + pulinho fofo -->
  <script>
    // Respiração eterna
    anime({
      targets: '#migrante',
      scaleY: [1, 1.06, 1],
      duration: 2400,
      loop: true,
      easing: 'easeInOutSine'
    });
    // Pulinhos aleatórios (igual o Duolingo)
    setInterval(() => {
      anime({
        targets: '#migrante',
        translateY: [-30, 0],
        rotate: [-5, 5, 0],
        duration: 800,
        easing: 'easeOutBounce'
      });
    }, 4000);
  </script>

  <h2 class="text-3xl font-bold mt-8 animate-pulse">Preparando sua jornada...</h2>
  
  <!-- Textos motivacionais que mudam (igual Duolingo) -->
  <p class="text-lg mt-4 text-center max-w-md opacity-90" id="motivational"></p>
  <script>
    const frases = [
      "15 minutos por dia podem mudar sua vida...",
      "Milhões de pessoas já cruzaram fronteiras com coragem.",
      "Você não está sozinho nessa jornada.",
      "A cada nível, você fica mais perto do sonho.",
      "O mundo é grande. Vamos juntos?",
      "Carregando esperança, força e um pouco de café.",
      "Sua próxima conquista está logo ali..."
    ];
    let i = 0;
    setInterval(() => {
      document.getElementById('motivational').textContent = frases[i];
      i = (i + 1) % frases.length;
    }, 3500);
    document.getElementById('motivational').textContent = frases[0];
  </script>

  <!-- Barra de progresso sutil -->
  <div id="progressBar" class="mt-10">
    <div id="progressFill"></div>
  </div>
  <script>
    anime({
      targets: '#progressFill',
      width: ['0%', '100%'],
      duration: 4000,
      easing: 'linear',
      complete: () => {
        // Quando terminar → some tudo com fade lindo
        anime({
          targets: '#loader',
          opacity: 0,
          duration: 800,
          easing: 'easeOutQuad',
          complete: () => document.getElementById('loader').remove()
        });
      }
    });
  </script>
</div>

<!-- Teu conteúdo real vem aqui embaixo (ou no layout normal) -->
<div class="hidden">
  <!-- Coloca aqui teu <%- body %> ou o jogo inteiro -->
  <h1>Bem-vindo ao O Migrante!</h1>
</div>

</body>
</html>
